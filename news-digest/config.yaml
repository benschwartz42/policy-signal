topics:
  - name: No Surprises Act Litigation
    description: >-
      The federal No Surprises Act and its implementation: HHS/CMS/DOL/Treasury rulemaking, the
      Independent Dispute Resolution (IDR) process, balance-billing protections, and related federal
      litigation. Litigation and lawsuits related to enforcement of this law in all states. Relevant
      items move or interpret the rules; general explainers are not.
    keywords:
      - no surprises act
      - balance billing
      - independent dispute resolution
      - IDR
      - surprise billing
      - litigation
      - lawsuit
      - complaint filing
  - name: Federal IDR
    description: >-
      The federal Independent Dispute Resolution (IDR) process under the No Surprises Act:
      CMS/HHS/DOL operational rules and guidance, the IDR portal, administrative fee and
      certified-IDRE fee changes, batching and eligibility determinations, arbitrator (IDRE)
      decisions, and litigation over the IDR process or the qualifying payment amount. Relevant
      items change or interpret how out-of-network payment disputes are arbitrated; general
      explainers are not.
    keywords:
      - independent dispute resolution
      - IDR
      - federal IDR
      - certified IDR entity
      - qualifying payment amount
      - QPA
      - arbitration
      - NSA
      - No Surprise act
  - name: Payer Litigation & Enforcement
    description: >-
      Litigation, regulatory enforcement, and sanctions involving health insurers/payers
      (Aetna, Elevance/Anthem, UnitedHealthcare, Cigna, Humana, Kaiser, BCBS, etc.). Includes
      state attorney-general suits, provider and member lawsuits, fund-diversion/fiduciary/ERISA
      claims, claims-denial and downcoding suits, CMS/Medicare Advantage sanctions and penalties,
      and payer policies that penalize providers over network status (e.g. Anthem/Elevance
      out-of-network facility penalties) plus state laws restricting them (e.g. Louisiana,
      Indiana). Relevant items report a lawsuit, ruling, settlement, regulatory action, sanction,
      or new payer policy; routine earnings, market-share, or network-expansion news is not.
    keywords:
      - out-of-network
      - network adequacy
      - reimbursement penalty
      - Medicare Advantage
      - claims denial
      - downcoding
      - attorney general
      - lawsuit
      - sues
      - settlement
      - sanctions
      - Aetna
      - Elevance
      - Anthem
      - UnitedHealthcare
      - Cigna
    queries:
      - health insurer lawsuit
      - insurer sued attorney general
      - Aetna lawsuit
      - Elevance Medicare Advantage sanctions
      - UnitedHealthcare lawsuit
      - Cigna lawsuit
      - Medicare Advantage sanctions
      - health plan settlement
