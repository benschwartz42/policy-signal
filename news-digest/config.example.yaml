# Policy Signal — configuration
# Copy to config.yaml and edit. Topics are config, not code: the `description`
# field is the plain-English rubric the LLM judges relevance against.

settings:
  # Rolling window. These policy topics are low-volume and the search APIs skew
  # toward older results, so a wide window + durable dedup is the right model:
  # the first run emails the recent backlog, then each day only net-new items
  # (the seen-store suppresses anything already sent). 720h = 30 days.
  lookback_hours: 720
  max_items_per_topic: 12     # cap per topic after scoring
  min_relevance: 0.5          # 0..1 LLM score cutoff
  model: claude-haiku-4-5     # classifier model (verify against current docs before deploy)
  seen_store_path: state/seen.json   # durable cross-day dedup (committed by the workflow)
  seen_ttl_days: 30
  sources:                    # authoritative-first
    - federal_register
    - courtlistener
    - google_news
    # - regulations_gov       # needs REGS_GOV_API_KEY
    # - rss                   # uses each topic's extra_rss list

delivery:
  sender: "Policy Signal <digest@your-verified-domain.com>"
  subject_prefix: "[Policy Signal]"
  recipients:
    - rcm-team@example.com

topics:
  - name: No Surprises Act
    description: >
      The federal No Surprises Act and its implementation: HHS/CMS/DOL/Treasury
      rulemaking, the Independent Dispute Resolution (IDR) process, balance-billing
      protections, and related federal litigation. Relevant items move or interpret
      the rules; general explainers are not.
    keywords:
      - no surprises act
      - balance billing
      - independent dispute resolution
      - IDR
      - surprise billing
    # extra_rss:
    #   - https://example-trade-press.com/feed   # confirm the feed is live before enabling

  - name: Prior Authorization Reform
    description: >
      Federal and state changes to payer prior-authorization requirements,
      including CMS interoperability/prior-auth rules and major payer policy shifts.
    keywords:
      - prior authorization
      - prior auth
      - utilization management

  - name: Federal IDR
    description: >
      The federal Independent Dispute Resolution (IDR) process under the No
      Surprises Act: CMS/HHS/DOL operational rules and guidance, the IDR portal,
      administrative fee and certified-IDRE fee changes, batching and eligibility
      determinations, arbitrator (IDRE) decisions, and litigation over the IDR
      process or the qualifying payment amount. Relevant items change or interpret
      how out-of-network payment disputes are arbitrated; general explainers are not.
    keywords:
      - independent dispute resolution
      - IDR
      - federal IDR
      - certified IDR entity
      - qualifying payment amount
      - QPA
      - arbitration
