name: Daily Digest

# Runs the pipeline once a day: ingest -> score -> email -> publish JSON.
# The seen-store and the published digest are committed back so dedup is durable
# and the companion app shows the latest results. (GitHub cron is UTC and may be
# delayed a few minutes under load — fine for a daily digest.)

on:
  schedule:
    # 12:00 UTC = 8:00 AM US Eastern during daylight saving (EDT, Mar-Nov),
    # 7:00 AM during standard time (EST). GitHub cron is fixed UTC (no DST).
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # to commit the seen-store + published digest

concurrency:
  group: daily-digest      # never let two runs overlap (protects the seen-store)
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: cp config.example.yaml config.yaml
        # For real recipients/topics, commit a config.yaml instead of copying the
        # example, or template it here from a secret.

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Email transport: Google Workspace SMTP (no RESEND_API_KEY -> SMTP path)
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Sender + recipients come from secrets (repo is public)
          DIGEST_SENDER: Policy Signal <${{ secrets.SMTP_USER }}>
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          # Optional source keys
          REGS_GOV_API_KEY: ${{ secrets.REGS_GOV_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
        run: |
          python run.py \
            --config config.yaml \
            --emit-json ../companion/public/digests/latest.json
          # also archive a dated copy
          cp ../companion/public/digests/latest.json \
             ../companion/public/digests/$(date -u +%F).json

      - name: Commit seen-store and published digest
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "policy-signal-bot"
          git config user.email "actions@github.com"
          # Stage separately: a missing seen.json (no items kept) must not abort
          # the add and leave the published digest unstaged.
          git add companion/public/digests/
          git add news-digest/state/seen.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore(digest): update seen-store and published digest [skip ci]"
            git push
          fi
