name: Daily Digest

# Runs the pipeline once a day: ingest -> score -> email -> publish JSON.
# The seen-store and the published digest are committed back so dedup is durable
# and the companion app shows the latest results.
#
# Triggering: an EXTERNAL timezone-aware scheduler (cron-job.org) fires this via
# the workflow_dispatch API at 08:00 America/New_York. GitHub's own `schedule`
# cron was removed because it runs scheduled jobs hours late at popular slots.

on:
  workflow_dispatch:
    inputs:
      test_recipients:
        description: "One-off TEST send to these address(es), comma-separated. Fresh window; does NOT email the team, update state, or the companion. Leave blank for a normal run."
        required: false
        default: ""
      publish_only:
        description: "Dry run for debugging: fresh window, NO email, NO state change, and does NOT touch the Digest page (results visible in the run log only). The page only ever reflects what was actually emailed."
        type: boolean
        required: false
        default: false

permissions:
  contents: write          # to commit the seen-store + published digest

concurrency:
  group: daily-digest      # never let two runs overlap (protects the seen-store)
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run digest
        # config.yaml is the committed source of truth (topics, settings, sender,
        # recipients) — edited via the Configure page. Only auth/transport creds
        # come from secrets.
        #
        # Modes (manual dispatch):
        #   normal        — email recipients, persist dedup, publish if non-empty
        #   test_recipients — email those addresses with a fresh window, persist nothing
        #   publish_only  — no email; fresh window; publish the digest to the companion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Email transport: Google Workspace SMTP (no RESEND_API_KEY -> SMTP path)
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Empty on scheduled runs (uses config recipients); set for a test send.
          DIGEST_RECIPIENTS: ${{ github.event.inputs.test_recipients }}
          # Fresh window (throwaway seen-store) for test/preview modes; the real
          # committed seen.json is left untouched.
          SEEN_STORE_PATH: ${{ (github.event.inputs.test_recipients != '' || github.event.inputs.publish_only == 'true') && '/tmp/fresh-seen.json' || '' }}
          COMPANION_URL: https://benschwartz42.github.io/policy-signal/
          REGS_GOV_API_KEY: ${{ secrets.REGS_GOV_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
        run: |
          DRY=""
          if [ "${{ github.event.inputs.publish_only }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --config config.yaml $DRY --emit-json out/digest.json
          ITEMS=$(grep -o '"item_count": [0-9]*' out/digest.json | grep -o '[0-9]*' || echo 0)
          echo "items=${ITEMS:-0}"
          # Publish to the companion ONLY for a real emailing run (not test sends,
          # not publish_only dry runs) and only when non-empty — so the Digest
          # page always matches what was actually emailed, and a quiet day never
          # blanks it.
          if [ "${ITEMS:-0}" -gt 0 ] && [ "${{ github.event.inputs.test_recipients }}" = "" ] && [ "${{ github.event.inputs.publish_only }}" != "true" ]; then
            cp out/digest.json ../companion/public/digests/latest.json
            cp out/digest.json ../companion/public/digests/$(date -u +%F).json
          fi

      - name: Commit seen-store and published digest
        # Only real emailing runs persist state / publish the page.
        if: ${{ github.event.inputs.test_recipients == '' && github.event.inputs.publish_only != 'true' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "policy-signal-bot"
          git config user.email "actions@github.com"
          # Stage separately: a missing seen.json (no items kept) must not abort
          # the add and leave the published digest unstaged.
          git add companion/public/digests/
          git add news-digest/state/seen.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            # No [skip ci]: this commit touches companion/** and must trigger the
            # Pages deploy so the Digest page reflects the new digest.
            git commit -m "chore(digest): update seen-store and published digest"
            git push
          fi
