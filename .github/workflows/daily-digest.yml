name: Daily Digest

# Runs the pipeline once a day: ingest -> score -> email -> publish JSON.
# The seen-store and the published digest are committed back so dedup is durable
# and the companion app shows the latest results. (GitHub cron is UTC and may be
# delayed a few minutes under load — fine for a daily digest.)

on:
  schedule:
    # 12:00 UTC = 8:00 AM US Eastern during daylight saving (EDT, Mar-Nov),
    # 7:00 AM during standard time (EST). GitHub cron is fixed UTC (no DST).
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      test_recipients:
        description: "One-off TEST send to these address(es), comma-separated. Uses a fresh window (ignores saved dedup) and does NOT update saved state or the companion. Leave blank for a normal run."
        required: false
        default: ""

permissions:
  contents: write          # to commit the seen-store + published digest

concurrency:
  group: daily-digest      # never let two runs overlap (protects the seen-store)
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fresh window for test send
        if: ${{ github.event.inputs.test_recipients != '' }}
        run: rm -f state/seen.json   # re-surface recent items for the test only

      - name: Run digest
        # config.yaml is the committed source of truth (topics, settings, sender,
        # recipients) — edited via the Configure page. Only auth/transport creds
        # come from secrets.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Email transport: Google Workspace SMTP (no RESEND_API_KEY -> SMTP path)
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Empty on scheduled runs (uses config recipients); set for a test send.
          DIGEST_RECIPIENTS: ${{ github.event.inputs.test_recipients }}
          # "View online" link in the email footer
          COMPANION_URL: https://benschwartz42.github.io/policy-signal/
          # Optional source keys
          REGS_GOV_API_KEY: ${{ secrets.REGS_GOV_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
        run: |
          python run.py \
            --config config.yaml \
            --emit-json ../companion/public/digests/latest.json
          # also archive a dated copy
          cp ../companion/public/digests/latest.json \
             ../companion/public/digests/$(date -u +%F).json

      - name: Commit seen-store and published digest
        if: ${{ github.event.inputs.test_recipients == '' }}   # test sends never persist
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "policy-signal-bot"
          git config user.email "actions@github.com"
          # Stage separately: a missing seen.json (no items kept) must not abort
          # the add and leave the published digest unstaged.
          git add companion/public/digests/
          git add news-digest/state/seen.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore(digest): update seen-store and published digest [skip ci]"
            git push
          fi
